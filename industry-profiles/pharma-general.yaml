# Pharmaceutical Manufacturing Industry Profile — General GMP (v1)
name: pharma-general
display_name: "제약 (Pharmaceutical Manufacturing - General GMP)"
description: General pharmaceutical manufacturing operations under KP-GMP, applicable to oral solids, non-sterile liquids, and basic APIs. v1 scope excludes sterile manufacturing, biologics, and advanced APIs.
applicable_laws:
  - 약사법 (Pharmaceutical Affairs Act) Article 34
  - 의약품 등의 기준 및 규정 (MFDS Notice)
  - ICH Q7 (API GMP)
  - ICH Q9 (Quality Risk Management)
  - ICH Q10 (Pharmaceutical Quality System)
  - PIC/S PE 009 (Harmonized GMP)
gmp_pillars:
  - quality_system (ICH Q10)
  - personnel_hygiene
  - premises_equipment
  - documentation_records
  - self_inspection
workflows:
  gmp:
    - change-control
    - deviation-capa
    - equipment-qualification
    - batch-mfg
    - supplier-qualification
    - stability
    - self-inspection
    - cleaning-validation
    - csv-validation
    - pqr
agent: gmp-agent
regulatory_reference: regulations/KR/MFDS-GMP.md
international_alignment:
  - framework: PIC/S
    level: harmonized
  - framework: ICH
    guidelines: [Q7, Q9, Q10]
v1_scope:
  includes:
    - general_oral_solid_dosage
    - non_sterile_liquids
    - basic_api
  excludes:
    - sterile_manufacturing
    - biologics
    - advanced_api
    - medical_devices
version: "1.0"
status: active
last_updated: 2026-06-17
