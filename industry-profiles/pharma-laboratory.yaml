# Pharmaceutical Laboratory Industry Profile — GLP Domain (v1)
name: pharma-laboratory
display_name: "비임상시험 기관 (Non-Clinical Laboratory — GLP Domain)"
description: Pharmaceutical and chemical non-clinical laboratory operations under MFDS GLP, ME K-REACH GLP, and OECD MAD principles.
applicable_laws:
  - 약사법 (Pharmaceutical Affairs Act)
  - 비임상시험 관리기준 (MFDS 고시)
  - 화학물질등록 및 평가 등에 관한 법률 (K-REACH)
  - 화학물질 위해성평가 시험기관 관리기준 (환경부 고시)
  - OECD GLP Principles (C(97)186/Final)
certification_authorities:
  - authority: MFDS
    scope: 의약품 비임상시험 (독성시험)
    validity_years: 3
  - authority: ME (NIER)
    scope: K-REACH 위해성평가 (화학물질)
    validity_years: 3
oecd_mad:
  applicable: true
  korea_accession_year: 2005
  benefits: Eliminates duplicate testing across OECD member countries
glp_pillars:
  - test_facility_management
  - quality_assurance_programme (QAU)
  - study_director_responsibility
  - test_and_reference_articles
  - study_protocol_and_conduct
  - data_integrity_ALCOA
  - equipment_calibration
  - records_retention_10y_min
workflows:
  glp:
    - test-article-management
    - study-protocol
    - study-conduct
    - data-management
    - personnel-qualification
    - equipment-calibration
    - qau-inspection
    - study-inspection-reference
agent: glp-agent
regulatory_references:
  kr_mfds: regulations/KR/MFDS-GLP.yaml
  kr_me: regulations/KR/ME-KREACH-GLP.yaml
  international: regulations/international/OECD-GLP.yaml
v1_scope:
  includes:
    - test_article_lifecycle_management
    - study_protocol_design_approval
    - study_conduct_with_ALCOA
    - raw_data_management
    - personnel_qualification_tracking
    - equipment_calibration
    - qau_independent_inspection
    - oecd_mad_inspection_support (reference workflow)
  excludes:
    - clinical_trial_management (v3, GCP domain)
    - analytical_method_validation (v2)
    - in_silico_modeling (v2)
    - multi_site_study_management (v2)
cross_domain_consumers:
  - msds (test article chemical data via msds_record_ref)
  - gmp (final study report → IND application)
  - kreach-registration (hazard assessment for K-REACH)
version: "1.0"
status: active
last_updated: "2026-06-17"
