# Pharmacovigilance Industry Profile — GVP Domain (v1)
name: pharmacovigilance
display_name: "약물감시 (Pharmacovigilance — GVP Domain)"
description: Post-market drug safety surveillance operations per KGVP, ICH E2 series, and EU GVP. Covers ICSR, signal detection, PBRER, RMP, PMS, benefit-risk assessment.
applicable_laws:
  - 약사법 Article 73의2 (이상반응 보고)
  - 약사법 Article 73의3 (재평가)
  - 의약품 이상반응 보고 등에 관한 규정 (MFDS 고시)
  - 의약품 재평가 규정
  - ICH E2A, E2B(R3), E2C(R2), E2D, E2E, E2F
  - EU GVP Modules 1-16
  - WHO-UMC (VigiBase)
ich_e2_guidelines:
  - E2A: Clinical Safety Data Management
  - E2B(R3): Electronic Transmission of ICSR
  - E2C(R2): PBRER
  - E2D: Post-approval Safety Data Management
  - E2E: Pharmacovigilance Planning
  - E2F: DSUR (development phase)
reporting_timelines:
  expedited_serious_icsr: "15 days to MFDS"
  pbrer: "Annually"
  signal_validation: "30 days internal"
  urgent_safety_action: "Immediate"
korean_specific:
  pms_mandatory:
    description: "Post-Marketing Surveillance mandatory for new drugs first 6-8 years"
    scope: "Population-based Korean study design"
  re_evaluation_cycle:
    period: "5-7 years post-approval"
    trigger: "Safety signals or new evidence"
    outcome: ["maintain", "restrict", "withdraw"]
  kids_role:
    name: "의약품안전사용센터 (Korea Institute of Drug Safety & Risk Management)"
    function: "Voluntary ADR reporting, signal analysis support"
workflows:
  gvp:
    - icsr-intake
    - signal-detection
    - pbrer-generation
    - risk-management-plan
    - pms-study-management
    - benefit-risk-assessment
    - labeling-update
    - urgent-safety-action-reference
agent: gvp-agent
regulatory_references:
  kr_mfds: regulations/KR/MFDS-GVP.yaml
  international: regulations/international/ICH-E2.yaml
v1_scope:
  includes:
    - icsr_intake_triage
    - statistical_signal_detection
    - pbrer_annual_generation
    - rmp_development_and_update
    - pms_study_management_korean
    - benefit_risk_assessment_ongoing
    - safety_labeling_updates
    - urgent_safety_action_dispatch (reference workflow)
  excludes:
    - ml_signal_prediction (v2)
    - real_world_evidence_rwe_integration (v2)
    - global_vigibase_api (v2)
    - pediatric_pv_focus (v2)
cross_domain_consumers:
  - gcp (trial SAE data → post-market signal context)
  - gmp (quality defects affecting safety)
  - gdp (cold chain excursions affecting safety)
  - msds (occupational exposure signals)
  - emergency-agent (urgent action dispatch)
version: "1.0"
status: active
last_updated: "2026-06-17"
