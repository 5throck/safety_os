source_mcp: mcp-kr-legislation
jurisdiction: KR
regulator: MOEL (고용노동부) / ME (환경부) / 소방청
framework: Chemical-Plant-Safety
title_ko: 화학공장 안전관리 (종합)
title_en: Chemical Plant Safety Management
primary_laws:
  - name: 산업안전보건법 (OSHA-KR)
    scope: 작업자 안전, PSM (Article 44), 위험성평가 (Article 36)
  - name: 화학물질관리법 (CCA)
    scope: 유해화학물질 취급 기준
  - name: 화학물질등록 및 평가 등에 관한 법률 (K-REACH)
    scope: 화학물질 등록/평가
  - name: 위험물안전관리법
    scope: 위험물 저장/취급 (지정수량 이상)
  - name: 대기환경보전법 / 수질환경보전법
    scope: 배출 허용 기준
v1_scope:
  includes: [refining, petrochemical, specialty_chemicals]
  excludes: [inorganic, pharmaceutical_chemicals]
last_updated: "2026-06-18"
