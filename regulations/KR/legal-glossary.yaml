      - { number: "제99조",  topic_en: "Fall prevention (추락방지)" }
      - { number: "제100조", topic_en: "Collapse prevention" }
      - { number: "제101조", topic_en: "Electrical hazard prevention (전기위해 방지)" }
      - { number: "제103조", topic_en: "Safety and Health Management Plan (안전보건관리계획)" }
      - { number: "제108조", topic_en: "Voluntary safety confirmation (자율안전확인)" }
