      - { number: "제28조", topic_en: "Tank inspection and maintenance" }

  액화석유가스의 안전관리 및 사업법:
    english: LPG Safety Control and Business Act
    abbreviation: LPG-SCBA
    regulator: KGS (한국가스안전공사)
    note: "Often abbreviated in schemas as 'LPG 안전관리법'."
    articles:
      - { number: "제29조", topic_en: "LPG charging business safety management" }
      - { number: "제30조", topic_en: "LPG hazardous zone / leak response" }
      - { number: "제37조", topic_en: "LPG tank / facility safety" }

  수소경제 육성 및 수소안전관리에 관한 법률:
    english: Hydrogen Economy Promotion and Hydrogen Safety Management Act
    abbreviation: HEPHSMA
    regulator: MOTIE (산업통상자원부) / KGS
    note: "Often abbreviated as 수소법 (2021)."
    articles:
      - { number: "제32조", topic_en: "Hydrogen charging station safety" }
      - { number: "제33조", topic_en: "Hydrogen charging station safety" }

  전기사업법:
    english: Electric Utility Act
    abbreviation: EUA
    regulator: MOTIE (산업통상자원부)
    articles:
      - { number: "제46조", topic_en: "Power generation facility installation permission" }
      - { number: "제47조", topic_en: "Generation facility safety management" }
      - { number: "제65조", topic_en: "Electrical facility safety" }

  전기안전관리법:
    english: Electrical Safety Control Act
    abbreviation: ESCA
    regulator: MOTIE (산업통상자원부) / KESCO
    note: "Cited in powergen-agent as 전기안전관리법 (sometimes informally 전기안전법)."
    articles:
      - { number: "제16조", topic_en: "Electrical facility safety inspection" }
      - { number: "제29조", topic_en: "Electrical Safety Manager appointment (전기안전관리자 선임)" }

  건설기술진흥법:
    english: Construction Technology Promotion Act
    abbreviation: CTPA
    regulator: MOLIT (국토교통부)
    articles:
      - { number: "제24조", topic_en: "Construction safety management / independent safety supervision" }
      - { number: "제25조", topic_en: "Construction safety management / independent safety supervision" }

  대기환경보전법:
    english: Clean Air Conservation Act
    abbreviation: CACA
    regulator: ME (환경부)
    note: "Referenced without specific article in ehschem environmental-monitoring (배출 허용 기준)."
    articles: []

  수질환경보전법:
    english: Water Environment Conservation Act
    abbreviation: WECA
    regulator: ME (환경부)
    note: "Referenced without specific article in ehschem environmental-monitoring. Statute formally now 수질및생태환경보전법; codebase uses 수질환경보전법 — preserved as-cited."
    articles: []

  위험물안전관리법:
    english: Dangerous Substances Safety Management Act
    abbreviation: DSSMA
    regulator: NFA / MOIS
    note: "Referenced across gasterm and ehschem workflows (위험물 저장/취급, 지정수량 이상) without specific articles."
    articles: []

  도시가스사업법:
    english: City Gas Business Act
    abbreviation: CGBA
    regulator: MOTIE (산업통상자원부)
    note: "Referenced in gasterm pipe-transfer-management (도시가스 배관/저장) without specific articles."
    articles: []

  폐기물관리법:
    english: Wastes Control Act
    abbreviation: WCA
    regulator: ME (환경부)
    note: "Referenced in powergen ash-chemical-waste-management without specific articles."
    articles: []

  환경보건법:
    english: Environmental Health Act
    abbreviation: EHA
    regulator: ME (환경부)
    note: "Verified as active Korean law on law.go.kr (법률 제20384호, 2024.3.19 개정). Covers environmental health impact assessment, environmental health monitoring, and hazardous substance exposure management."
    articles: []

