source_mcp: mcp-kr-legislation  # curated reference glossary; statute content sourced from Korean legislation
# Legal & Regulatory Glossary — Safety OS
# Single source of truth: Korean statute proper noun → English gloss + abbreviation + article citations.
# Consumed by: validate-md-language.ts (Korean allowlist via `statutes` keys), authors (citation consistency).
# Korean statute names are preserved per CLAUDE.md §4 — never translated.
# This file is structured reference data (legitimate bilingual mapping), not prose.
#
# Provenance: All entries and article numbers are mined from actual codebase usage
# (agents/*.md Section A Legal Basis blocks, workflows/**/schema.yaml legal_basis fields,
# regulations/KR/*.yaml). Articles NOT referenced anywhere in the codebase are omitted;
# accuracy over completeness. Unverified entries are explicitly commented.
version: 1.0.0
last_updated: 2026-06-21

# =============================================================================
# KOREAN STATUTES (validator allowlist — keys are the exact Korean strings used
# in codebase citations). NOTE: citation forms vary (제NN조 vs Article NN);
# the `articles[].number` field uses the Korean 제NN조 form as canonical.
# =============================================================================
