  중대재해처벌법:
    english: Serious Accidents Punishment Act
    abbreviation: SAPA
    regulator: MOEL (고용노동부)
    note: "Full 16-article structure: Ch.1 General (Art 1-2), Ch.2 Serious Industrial Accidents (Art 3-9), Ch.3 Serious Civic Disasters (Art 10-11), Ch.4 Supplementary (Art 12-16). Verified via kr_safety MCP (MST=228817)."
    articles:
      - { number: "제3조",  topic_en: "Scope — application to business owners and management responsible persons (경영책임자등의 범위)" }
      - { number: "제4조",  topic_en: "Safety and health assurance obligation — management system establishment (사업주와 경영책임자등의 안전 및 보건 확보의무)" }
      - { number: "제5조",  topic_en: "Obligations for Contract, Lease, and Outsourcing (도급·용역·위탁 등 관계에서의 안전·보건 확보의무)" }
      - { number: "제6조",  topic_en: "Punishment for serious industrial accidents (중대산업재해 사업주와 경영책임자등의 처벌)" }
      - { number: "제7조",  topic_en: "Dual liability for serious industrial accidents — corporate penalty (중대산업재해의 양벌규정)" }
      - { number: "제8조",  topic_en: "Mandatory safety and health education attendance (안전보건교육의 수강)" }
      - { number: "제9조",  topic_en: "Safety and health assurance obligation for civic disasters (중대시민재해 사업주와 경영책임자등의 안전 및 보건 확보의무)" }
      - { number: "제10조", topic_en: "Punishment for serious civic disasters (중대시민재해 사업주와 경영책임자등의 처벌)" }
      - { number: "제11조", topic_en: "Dual liability for serious civic disasters — corporate penalty (중대시민재해의 양벌규정)" }
      - { number: "제12조", topic_en: "Notification of final conviction (형 확정 사실의 통보)" }
      - { number: "제13조", topic_en: "Public disclosure of serious industrial accident occurrence (중대산업재해 발생사실 공표)" }
      - { number: "제14조", topic_en: "Special procedural rules for trials (심리절차에 관한 특례)" }
      - { number: "제15조", topic_en: "Damages liability (손해배상의 책임)" }
      - { number: "제16조", topic_en: "Government support and reporting requirements (정부의 사업주 등에 대한 지원 및 보고)" }

  약사법:
    english: Pharmaceutical Affairs Act
    abbreviation: PAA
    regulator: MFDS (식품의약품안전처)
    articles:
      - { number: "제34조",     topic_en: "Mandatory GMP for pharmaceutical manufacturing" }
      - { number: "제43조의2",  topic_en: "Mandatory pharmaceutical distribution management (의약품 유통관리 의무화)" }
      - { number: "제43조의3",  topic_en: "Pharmaceutical recall duty (의약품 회수 의무)" }
      - { number: "제69조",     topic_en: "Clinical Trial Application (CTA) approval required" }
      - { number: "제73조의2",  topic_en: "SAE reporting / ADR reporting (의약품 안전사용 관리)" }
      - { number: "제73조의3",  topic_en: "Pharmaceutical re-evaluation (의약품 재평가)" }

  의약품등기준규정:
    english: Standards and Specifications for Pharmaceuticals, etc. (KP-GMP delegated regulation)
    abbreviation: KP-GMP
    regulator: MFDS (식품의약품안전처)
    note: "Delegated regulation under 약사법 Article 34. Cited as KP-GMP."
    articles:
      - { number: "제12조", topic_en: "Manufacturing Control Standards (제조관리기준) / PQR / supplier qualification" }
      - { number: "제15조", topic_en: "Self-Inspection (자체점검)" }
      - { number: "제16조", topic_en: "Qualification (적격성평가) — equipment" }
      - { number: "제17조", topic_en: "Validation (밸리데이션) — incl. cleaning & CSV" }
      - { number: "제18조", topic_en: "Change Control (변경관리)" }
      - { number: "제19조", topic_en: "Deviation Management and CAPA (이상관리 및 시정조치)" }
      - { number: "제20조", topic_en: "Stability (안정성) — shelf-life data" }

  화학물질관리법:
    english: Chemicals Control Act
    abbreviation: CCA
    regulator: ME (환경부) / MOEL shared
    note: "Cited in agents as TCCL-integrated toxic/accident-preparedness chemical management."
    articles:
      - { number: "제20조", topic_en: "Harmful chemicals (유해화학물질)" }
      - { number: "제23조", topic_en: "Accident-preparedness substances (사고대비물질)" }

  화학물질등록 및 평가 등에 관한 법률:
    english: Act on Registration and Evaluation of Chemicals
    abbreviation: K-REACH
    regulator: ME (환경부)
    note: "Also abbreviated ARECS. Cited in MSDS and GLP (K-REACH hazard testing) contexts."
    articles:
      - { number: "제10조", topic_en: "Chemical registration — monthly reporting" }
      - { number: "제11조", topic_en: "Registration for substances ≥ 1 ton/year" }
      - { number: "제13조", topic_en: "Chemical evaluation" }

  의료기기법:
    english: Medical Device Act
    abbreviation: K-MDA
    regulator: MFDS (식품의약품안전처)
    articles:
      - { number: "제12조", topic_en: "Medical device manufacturing/import licensing" }
      - { number: "제16조", topic_en: "Medical device GMP / quality management (KGMP-MD)" }
      - { number: "제20조", topic_en: "Medical device PMS / recall" }
      - { number: "제23조", topic_en: "Medical device distribution / supply chain" }
      - { number: "제83조", topic_en: "Post-market surveillance (PMS) framework" }
    note: "의료기기법 Article 83 was mistakenly mapped from EU MDR Article 83 (PMS system). Korea's PMS equivalent is '시판 후 조사' under separate provisions. Schema corrected to cite 'EU MDR Article 83' explicitly."

  고압가스안전관리법:
