    - article: "13"
      topic_ko: 하도급업체 안전보건 의무
      topic_en: Subcontractor safety/health obligations
serious_accident_threshold:
  fatality: "사망 1명 이상"
  serious_injury: "6개월 이상 치료를 요하는 부상 1명 이상"
  multiple_injury: "동일 사고로 3명 이상 부상"
  occupational_disease: "업무상 질병 1년 이상 요양"
construction_specific_obligations:
