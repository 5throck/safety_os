  prime_contractor: 원도급자 (하도급자 관리, 안전관리비 집행)
  subcontractor: 하도급자 (자체 안전관리)
penalties:
  business_entity: "벌금 최대 1억 원"
  management: "징역 최대 1년 또는 벌금 최대 1억 원"
