source_mcp: mcp-kr-legislation
jurisdiction: KR
regulator: MOEL (고용노동부)
framework: SAPA-Construction
title_ko: 중대재해처벌법 건설업 특례
title_en: Serious Accidents Punishment Act — Construction Provisions
primary_law:
  name_ko: 중대재해처벌법
  name_en: SAPA
  articles:
    - article: "3"
      topic_ko: 경영책임자 처벌 (건설업 포함)
      topic_en: Management responsibility
    - article: "7"
      topic_ko: 사업주 의무 (안전보건관리체계)
      topic_en: Employer obligations
    - article: "12"
      topic_ko: 건설공사 특례 (발주처/원사업주 책임 강화)
