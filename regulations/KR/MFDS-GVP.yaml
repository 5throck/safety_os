source_mcp: mcp-kr-legislation
jurisdiction: KR
regulator: MFDS (식품의약품안전처)
framework: KGVP
title_ko: 의약품 안전사용 관리 및 이상반응 보고
title_en: Pharmaceutical Safety Use Management and Adverse Reaction Reporting (KGVP)
primary_law:
  name_ko: 약사법
  name_en: Pharmaceutical Affairs Act
  articles:
    - article: "73의2"
      topic_ko: 의약품 안전사용 관리 (이상반응 보고 의무)
      topic_en: Pharmaceutical safety use management (mandatory ADR reporting)
    - article: "73의3"
      topic_ko: 의약품 재평가
      topic_en: Drug re-evaluation
delegated_legislation:
  - name_ko: 의약품 이상반응 보고 등에 관한 규정 (MFDS 고시)
    name_en: Regulations on Drug Adverse Reaction Reporting (MFDS Notice)
    scope: KGVP — ICSR, signal detection, PBRER, RMP, PMS
  - name_ko: 의약품 재평가 규정
    name_en: Drug Re-evaluation Regulations
    scope: 5-7년 주기 재평가
key_topics:
  - individual_case_safety_reports (ICSR)
  - signal_detection_management
  - periodic_benefit_risk_evaluation (PBRER)
  - risk_management_plan (RMP)
  - post_marketing_surveillance (PMS)
  - re_evaluation_5to7_year_cycle
  - labeling_safety_updates
reporting_channels:
  - mandatory_professional: 의료진 의무 보고 (15일 이내)
  - voluntary_healthcare: KIDS voluntary reporting (Korea Institute of Drug Safety)
  - patient_direct: 환자 직접 보고
reporting_timelines:
  expedited_serious: "15 days from awareness"
  annual_aggregate: "PBRER annually"
international_alignment:
  - framework: ICH E2 series
    references: [E2A, E2B(R3), E2C(R2), E2D, E2E, E2F]
    alignment_level: full
  - framework: EU GVP
    reference: Modules 1-16
    alignment_level: harmonized
  - framework: WHO-UMC
    reference: Uppsala Monitoring Centre
    alignment_level: data_sharing
kids_role:
  name: 의약품안전사용센터 (Korea Institute of Drug Safety & Risk Management)
  function: Voluntary reporting collection, signal analysis support, healthcare professional training
last_updated: "2026-06-17"
